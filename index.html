// ─── HELPERS ─────────────────────────────────────────────────────────────────
const calcOre = d => d.assegn.reduce((s,a)=>s+a[2],0);
const calcPot = d => extractPot(d.note);
const oreTot = (disc,st) => ORE[disc]&&ORE[disc][st]?Object.values(ORE[disc][st]).reduce((s,v)=>s+v,0):0;
const oreAss = (docs,disc,st) => docs.filter(d=>d.disc===disc).flatMap(d=>d.assegn.filter(a=>a[0]===st)).reduce((s,a)=>s+a[2],0);
const oreRes = (docs,disc) => Object.keys(ORE[disc]||{}).reduce((t,st)=>t+Math.max(0,oreTot(disc,st)-oreAss(docs,disc,st)),0);
const getSede = st => st.startsWith("ISOLA")?"ISOLA":st.startsWith("VILLA")?"VILLA":"CARCERARIA";
function bS(ore,std,max){
  if(ore>max) return{bg:"#FEE2E2",c:"#DC2626"};
  if(ore>std) return{bg:"#FEF3C7",c:"#D97706"};
  if(ore===std) return{bg:"#DCFCE7",c:"#059669"};
  if(ore===0) return{bg:"#F3F4F6",c:"#9CA3AF"};
  return{bg:"#DBEAFE",c:"#1D4ED8"};
}
function getScavalco(docs) {
  return docs.filter(d=>{
    const hasI=d.assegn.some(a=>a[0].startsWith("ISOLA"));
    const hasV=d.assegn.some(a=>a[0].startsWith("VILLA"));
    return hasI&&hasV;
  });
}
function generateExport(docenti,settings) {
  const {oreStd,oreMax}=settings;
  const html=`<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><title>Quadro Cattedre 2026/27 – Bolisani</title>
<style>body{font-family:Arial,sans-serif;font-size:11px;margin:20px}h1{font-size:16px;color:#1B3A6B}h2{font-size:13px;color:#1B3A6B;border-bottom:2px solid #1B3A6B;margin-top:20px}table{border-collapse:collapse;width:100%;margin-bottom:16px}th{background:#1B3A6B;color:#fff;padding:4px 8px;text-align:left}td{padding:3px 8px;border-bottom:1px solid #ddd}.ok{color:#059669}.warn{color:#D97706}.err{color:#DC2626}.cont{background:#FEE2E2;color:#DC2626;padding:0 4px;border-radius:3px}@media print{.no-print{display:none}}</style></head><body>
<div class="no-print"><button onclick="window.print()">🖨️ Stampa / Salva PDF</button></div>
<h1>📚 Quadro Cattedre A.S. 2026/27 – I.I.S.S. Ettore Bolisani</h1>
<h2>Riepilogo Docenti</h2>
<table><tr><th>Docente</th><th>Disciplina</th><th>Ore</th><th>Stato</th><th>Classi (continuità)</th><th>Note</th></tr>
${docenti.map(d=>{
  const ore=calcOre(d);
  const stato=ore>oreMax?'<span class="err">ECCESSO</span>':ore>oreStd?'<span class="warn">AUMENTATA</span>':ore===oreStd?'<span class="ok">COMPLETA</span>':'INCOMPLETA';
  const classi=d.assegn.map(a=>`${a[1]}${a[3]?'<span class="cont">C</span>':''}`).join(', ');
  return`<tr><td>${d.nome}${d.rosso?' ⚠️':''}</td><td>${d.disc} – ${CC[d.disc]||''}</td><td>${ore}h</td><td>${stato}</td><td>${classi}</td><td>${d.note||''}</td></tr>`;
}).join('')}
</table>
<h2>Ore Residue per Disciplina</h2>
<table><tr><th>Disciplina</th><th>Totale</th><th>Assegnate</th><th>Residue</th></tr>
${Object.keys(CC).filter(k=>ORE[k]).map(disc=>{
  const sedi=Object.keys(ORE[disc]);
  const tot=sedi.reduce((s,st)=>s+oreTot(disc,st),0);
  const ass=sedi.reduce((s,st)=>s+oreAss(docenti,disc,st),0);
  const res=Math.max(0,tot-ass);
  return`<tr><td>${disc} – ${CC[disc]}</td><td>${tot}h</td><td>${ass}h</td><td class="${res>0?'err':'ok'}">${res}h ${res===0?'✓':''}</td></tr>`;
}).join('')}
</table>
<p style="color:#888;font-size:10px">Generato il ${new Date().toLocaleDateString('it-IT')} – Cattedra std ${oreStd}h, max ${oreMax}h</p>
</body></html>`;
  const w=window.open('','_blank');
  w.document.write(html);
  w.document.close();
}

              {docD.map(d=>{
                const ore=calcOre(d);
                const bs=bS(ore,oreStd,oreMax);
                return(
                  <tr key={d.id} style={{borderBottom:"1px solid #F3F4F6",cursor:"pointer"}} onClick={()=>onDoc(d.id)}>
                    <td style={{padding:"7px 9px",fontWeight:600,color:d.rosso?"#DC2626":"#1B3A6B"}}>{d.nome}{!d.ruolo&&<span style={{fontSize:10,color:"#9CA3AF",marginLeft:5}}>(non conf.)</span>}</td>
                    <td style={{padding:"7px 9px"}}><span style={{fontSize:11,padding:"2px 7px",borderRadius:9,background:d.ruolo?"#DCFCE7":"#F3F4F6",color:d.ruolo?"#059669":"#9CA3AF"}}>{d.ruolo?"In ruolo":"Esterno"}</span></td>
                    <td style={{padding:"7px 9px"}}>
                      {d.assegn.map((a,i)=>(
                        <span key={i} style={{display:"inline-block",margin:"1px 2px",padding:"1px 6px",borderRadius:9,fontSize:10,background:a[3]?"#FEE2E2":"#EFF6FF",color:a[3]?"#DC2626":"#1D4ED8",border:a[3]?"1px solid #FECACA":"1px solid #BFDBFE"}}>
                          {a[1]} ({a[2]}h){a[3]?"🔒":""}
                        </span>
                      ))}
                    </td>
                    <td style={{padding:"7px 9px"}}><span style={{padding:"2px 9px",borderRadius:10,fontSize:11,fontWeight:600,background:bs.bg,color:bs.c}}>{ore}h</span></td>
                    <td style={{padding:"7px 9px",fontSize:11}}>{ore>oreMax?"⚠️ Eccesso":ore>oreStd?"Aumentata":ore===oreStd?"✓ Completa":ore===0?"—":"Incompleta"}</td>
                    <td style={{padding:"7px 9px",fontSize:11,color:"#6B7280"}}>{d.note||"—"}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {Object.keys(ORE[selDisc]||{}).map(st=>{
            const cls=Object.keys(ORE[selDisc][st]||{});
            return cls.length?(
              <div key={st} style={{marginTop:16}}>
                <div style={{fontWeight:700,fontSize:12,color:"#1B3A6B",marginBottom:7}}>{SEDE_LABEL[st]} – Copertura Classi</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                  {cls.map(cl=>{
                    const need=ORE[selDisc][st][cl];
                    const dCl=docD.filter(d=>d.assegn.some(a=>a[0]===st&&a[1]===cl));
                    const cop=dCl.flatMap(d=>d.assegn.filter(a=>a[0]===st&&a[1]===cl)).reduce((s,a)=>s+a[2],0);
                    const cont=dCl.some(d=>d.assegn.some(a=>a[0]===st&&a[1]===cl&&a[3]===1));
                    const ok=cop>=need;
                    return(
                      <div key={cl} title={dCl.map(d=>d.nome).join(", ")||"Non assegnato"} style={{padding:"4px 9px",borderRadius:6,fontSize:11,textAlign:"center",background:ok?"#F0FDF4":"#FFF1F2",color:ok?"#059669":"#DC2626",border:cont?"2px solid #DC2626":"1px solid transparent",minWidth:70}}>
                        <div style={{fontWeight:700}}>{cl}</div>
                        <div>{cop}/{need}h {ok?"✓":"⚠"}</div>
                        {cont&&<div style={{fontSize:9,color:"#DC2626"}}>🔒cont.</div>}
                        {dCl.length>0&&<div style={{fontSize:9,opacity:.7}}>{dCl.map(d=>d.nome.split(" ")[0]).join(",")}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            ):null;
          })}
        </div>
      )}
    </div>
  );
}

// ─── DOCENTI ─────────────────────────────────────────────────────────────────

              <div>
                <div style={{fontWeight:600,fontSize:12,color:d.rosso?"#DC2626":"#1B3A6B"}}>{d.nome}</div>

            </div>
            <button onClick={()=>updDoc(selDoc.id,d=>({...d,ruolo:!d.ruolo}))} style={{padding:"4px 10px",borderRadius:6,border:"1px solid",cursor:"pointer",fontSize:11,background:selDoc.ruolo?"#DCFCE7":"#F3F4F6",color:selDoc.ruolo?"#059669":"#6B7280",borderColor:selDoc.ruolo?"#86EFAC":"#D1D5DB"}}>
              {selDoc.ruolo?"✓ In ruolo":"✗ Non confermato"}

              <label style={{display:"flex",alignItems:"center",gap:4,fontSize:12,cursor:"pointer"}}>

// ─── CLASSI ───────────────────────────────────────────────────────────────────
function ClassiView({docenti}){
  const [st,setSt]=useState("ISOLA_DIURNO");
  const [disc,setDisc]=useState("A012");
  const classi=CLASSI[st]||[];
  const ore=((ORE[disc]||{})[st])||{};
  return(
    <div>
      <div style={{display:"flex",gap:12,marginBottom:14,flexWrap:"wrap"}}>
        {[["Sede","st",Object.keys(SEDE_LABEL)],[("Disciplina"),disc,Object.keys(CC).filter(k=>ORE[k]&&ORE[k][st])]].map(([label,_v,opts],i)=>(
          <div key={i}>
            <label style={{fontSize:11,color:"#6B7280",display:"block",marginBottom:3}}>{label}</label>
            {i===0?(
              <select value={st} onChange={e=>setSt(e.target.value)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12}}>
                {Object.keys(SEDE_LABEL).map(k=><option key={k} value={k}>{SEDE_LABEL[k]}</option>)}
              </select>
            ):(
              <select value={disc} onChange={e=>setDisc(e.target.value)} style={{padding:"5px 10px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12}}>
                {Object.keys(CC).filter(k=>ORE[k]&&ORE[k][st]).map(k=><option key={k} value={k}>{k} – {CC[k]}</option>)}
              </select>
            )}
          </div>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#1B3A6B",marginBottom:10}}>{CC[disc]} – {SEDE_LABEL[st]}</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:9}}>
          {classi.filter(cl=>ore[cl]>0).map(cl=>{
            const need=ore[cl]||0;
            const dCl=docenti.filter(d=>d.disc===disc&&d.assegn.some(a=>a[0]===st&&a[1]===cl));
            const cop=dCl.flatMap(d=>d.assegn.filter(a=>a[0]===st&&a[1]===cl)).reduce((s,a)=>s+a[2],0);
            const cont=dCl.some(d=>d.assegn.some(a=>a[0]===st&&a[1]===cl&&a[3]===1));
            const ok=cop>=need;
            return(
              <div key={cl} style={{borderRadius:7,padding:10,border:cont?"2px solid #DC2626":"1px solid #E5E7EB",background:ok?"#F0FDF4":"#FFF1F2"}}>
                <div style={{fontWeight:700,fontSize:13,color:ok?"#059669":"#DC2626"}}>{cl}</div>
                <div style={{fontSize:12,margin:"4px 0"}}>{cop}/{need}h {ok?"✓":"⚠"}</div>
                {cont&&<div style={{fontSize:10,color:"#DC2626",marginBottom:3}}>🔒 Continuità</div>}
                {dCl.length>0?dCl.map(d=><div key={d.id} style={{fontSize:11,color:"#374151"}}>👤 {d.nome}</div>):<div style={{fontSize:11,color:"#9CA3AF"}}>Non assegnato</div>}
              </div>
            );
          })}
          {classi.filter(cl=>ore[cl]>0).length===0&&<div style={{color:"#9CA3AF",fontSize:12}}>Nessuna classe per questa combinazione.</div>}
        </div>
      </div>
    </div>
  );
}

            return(
              <div key={d.id} style={{padding:"6px 12px",borderRadius:7,background:"#FFFBEB",border:"1px solid #FDE68A",fontSize:12}}>
                <b style={{color:"#1B3A6B"}}>{d.nome}</b> <span style={{color:"#6B7280"}}>{d.disc}</span>
                {oSI>0&&<span style={{marginLeft:6,background:"#FEF3C7",color:"#D97706",padding:"1px 6px",borderRadius:8,fontSize:10}}>Isola Ser. {oSI}h</span>}
                {oSV>0&&<span style={{marginLeft:4,background:"#F3E8FF",color:"#7C3AED",padding:"1px 6px",borderRadius:8,fontSize:10}}>Villa Ser. {oSV}h</span>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ─── GRUPPI LINGUA ────────────────────────────────────────────────────────────
function GruppiView({gruppi,saveGrp}){
  const [filterSede,setFilterSede]=useState("ALL");
  const [edit,setEdit]=useState(null);
  const [form,setForm]=useState({sede:"ISOLA",anno:"3",gruppo:"",disc:"AB24",classiOrigine:"",docente:"",ore:3,note:""});
  const filt=filterSede==="ALL"?gruppi:gruppi.filter(g=>g.sede===filterSede);
  function startEdit(g){setEdit(g.id);setForm({...g,classiOrigine:g.classiOrigine.join(", ")});}
  function saveEdit(){saveGrp(gruppi.map(g=>g.id===edit?{...form,id:g.id,classiOrigine:form.classiOrigine.split(",").map(s=>s.trim())}:g));setEdit(null);}
  function addGruppo(){const id=Math.max(...gruppi.map(g=>g.id),0)+1;saveGrp([...gruppi,{...form,id,classiOrigine:form.classiOrigine.split(",").map(s=>s.trim())}]);setForm(f=>({...f,gruppo:"",classiOrigine:"",docente:"",note:""}));}
  function delGruppo(id){if(confirm("Eliminare gruppo?"))saveGrp(gruppi.filter(g=>g.id!==id));}
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#1B3A6B",marginBottom:12}}>Gruppi Lingua – 2ª e 3ª Lingua Straniera</h2>
      <div style={{display:"flex",gap:10,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
        {["ALL","ISOLA","VILLA"].map(s=>(
          <button key={s} onClick={()=>setFilterSede(s)} style={{padding:"5px 14px",borderRadius:6,border:"1px solid #D1D5DB",background:filterSede===s?"#1B3A6B":"#fff",color:filterSede===s?"#fff":"#374151",cursor:"pointer",fontSize:12,fontWeight:filterSede===s?700:400}}>{s==="ALL"?"Tutti":s==="ISOLA"?"Isola":"Villafranca"}</button>
        ))}
        <span style={{fontSize:11,color:"#9CA3AF"}}>{filt.length} gruppi</span>
      </div>
      <div style={{background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:14,overflowX:"auto"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#F9FAFB"}}>
            {["Sede","Anno","Gruppo","Disciplina","Classi di provenienza","Docente","Ore","Note",""].map(h=><th key={h} style={{padding:"6px 8px",textAlign:"left",borderBottom:"1px solid #E5E7EB",fontWeight:600,color:"#6B7280",whiteSpace:"nowrap"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {filt.map(g=>(
              <tr key={g.id} style={{borderBottom:"1px solid #F3F4F6"}}>
                {edit===g.id?(
                  <>
                    <td colSpan={8} style={{padding:"8px"}}>
                      <div style={{display:"flex",gap:7,flexWrap:"wrap"}}>
                        <select value={form.sede} onChange={e=>setForm(f=>({...f,sede:e.target.value}))} style={{padding:"4px 7px",borderRadius:5,border:"1px solid #D1D5DB",fontSize:11}}>
                          <option value="ISOLA">Isola</option><option value="VILLA">Villa</option>
                        </select>
                        <input value={form.anno} onChange={e=>setForm(f=>({...f,anno:e.target.value}))} placeholder="Anno" style={{width:50,...inp}}/>
                        <input value={form.gruppo} onChange={e=>setForm(f=>({...f,gruppo:e.target.value}))} placeholder="Nome gruppo" style={{width:160,...inp}}/>
                        <select value={form.disc} onChange={e=>setForm(f=>({...f,disc:e.target.value}))} style={{padding:"4px 7px",borderRadius:5,border:"1px solid #D1D5DB",fontSize:11}}>
                          {["AB24","AC24","A346"].map(k=><option key={k} value={k}>{k}</option>)}
                        </select>
                        <input value={form.classiOrigine} onChange={e=>setForm(f=>({...f,classiOrigine:e.target.value}))} placeholder="Classi (sep. virgola)" style={{width:200,...inp}}/>
                        <input value={form.docente} onChange={e=>setForm(f=>({...f,docente:e.target.value}))} placeholder="Docente" style={{width:120,...inp}}/>
                        <input type="number" value={form.ore} onChange={e=>setForm(f=>({...f,ore:+e.target.value}))} style={{width:45,...inp}}/>
                        <input value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Note" style={{width:80,...inp}}/>
                        <button onClick={saveEdit} style={{...btn,background:"#059669"}}>✓</button>
                        <button onClick={()=>setEdit(null)} style={{...btn,background:"#6B7280"}}>✕</button>
                      </div>
                    </td>
                  </>
                ):(
                  <>
                    <td style={{padding:"6px 8px"}}><span style={{padding:"2px 7px",borderRadius:8,background:g.sede==="ISOLA"?"#DBEAFE":"#F3E8FF",color:g.sede==="ISOLA"?"#1D4ED8":"#7C3AED",fontSize:10,fontWeight:700}}>{g.sede}</span></td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{g.anno}°</td>
                    <td style={{padding:"6px 8px",fontWeight:600}}>{g.gruppo}</td>
                    <td style={{padding:"6px 8px"}}><span style={{background:"#FEF3C7",color:"#D97706",padding:"2px 6px",borderRadius:7,fontSize:10,fontWeight:700}}>{g.disc}</span></td>
                    <td style={{padding:"6px 8px",fontSize:11,color:"#374151"}}>{g.classiOrigine.join(" | ")}</td>
                    <td style={{padding:"6px 8px",color:g.docente?"#059669":"#9CA3AF"}}>{g.docente||"— da assegnare"}</td>
                    <td style={{padding:"6px 8px",fontWeight:700,color:"#1B3A6B"}}>{g.ore}h</td>
                    <td style={{padding:"6px 8px",fontSize:10,color:"#9CA3AF"}}>{g.note||"—"}</td>
                    <td style={{padding:"6px 8px"}}>
                      <button onClick={()=>startEdit(g)} style={{...btn,background:"#3B82F6",marginRight:3}}>✏</button>
                      <button onClick={()=>delGruppo(g.id)} style={{...btn,background:"#DC2626"}}>✕</button>
                    </td>
                  </>
                )}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      {/* Aggiungi gruppo */}
      <div style={{background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#1B3A6B",marginBottom:8}}>+ Aggiungi Gruppo Lingua</div>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",alignItems:"center"}}>
          <select value={form.sede} onChange={e=>setForm(f=>({...f,sede:e.target.value}))} style={{padding:"5px 9px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12}}>
            <option value="ISOLA">Isola</option><option value="VILLA">Villafranca</option>
          </select>
          <input value={form.anno} onChange={e=>setForm(f=>({...f,anno:e.target.value}))} placeholder="Anno (es. 3)" style={{width:60,...inp2}}/>
          <input value={form.gruppo} onChange={e=>setForm(f=>({...f,gruppo:e.target.value}))} placeholder="Nome gruppo" style={{width:160,...inp2}}/>
          <select value={form.disc} onChange={e=>setForm(f=>({...f,disc:e.target.value}))} style={{padding:"5px 9px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12}}>
            {["AB24","AC24","A346"].map(k=><option key={k} value={k}>{k} – {CC[k]}</option>)}
          </select>
          <input value={form.classiOrigine} onChange={e=>setForm(f=>({...f,classiOrigine:e.target.value}))} placeholder="Classi (es: 3A TUR, 3B RIM)" style={{width:190,...inp2}}/>
          <input value={form.docente} onChange={e=>setForm(f=>({...f,docente:e.target.value}))} placeholder="Docente" style={{width:120,...inp2}}/>
          <input type="number" value={form.ore} onChange={e=>setForm(f=>({...f,ore:+e.target.value}))} style={{width:55,...inp2}}/>
          <button onClick={addGruppo} style={{padding:"5px 14px",background:"#1B3A6B",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Aggiungi</button>
        </div>
      </div>
    </div>
  );
}
const inp={padding:"4px 7px",borderRadius:5,border:"1px solid #D1D5DB",fontSize:11};
const inp2={padding:"5px 9px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:12};
const btn={padding:"3px 8px",border:"none",borderRadius:5,cursor:"pointer",color:"#fff",fontSize:11};

// ─── CARCERARIA ───────────────────────────────────────────────────────────────
function CarcereView({docenti}){
  const anni=["I Anno","II Anno","III Anno","IV Anno","V Anno"];
  const [selAnno,setSelAnno]=useState("I Anno");
  const ore=ORE_CARCERARIA[selAnno]||{};
  const discList=Object.keys(ore);
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#1B3A6B",marginBottom:12}}>Sezione Carceraria – SIA Penitenziario</h2>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        {anni.map(a=>(
          <button key={a} onClick={()=>setSelAnno(a)} style={{padding:"6px 14px",borderRadius:7,border:"1px solid #D1D5DB",background:selAnno===a?"#1B3A6B":"#fff",color:selAnno===a?"#fff":"#374151",cursor:"pointer",fontSize:12,fontWeight:selAnno===a?700:400}}>{a}</button>
        ))}
      </div>
      <div style={{background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:14,color:"#1B3A6B",marginBottom:12}}>{selAnno} – Quadro Ore</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}}>
          {discList.map(disc=>{
            const need=ore[disc]||0;
            const dCl=docenti.filter(d=>d.disc===disc&&d.assegn.some(a=>a[0]==="CARCERARIA"&&a[1]===selAnno));
            const cop=dCl.flatMap(d=>d.assegn.filter(a=>a[0]==="CARCERARIA"&&a[1]===selAnno)).reduce((s,a)=>s+a[2],0);
            const ok=cop>=need;
            return(
              <div key={disc} style={{borderRadius:7,padding:12,border:"1px solid #E5E7EB",background:ok?"#F0FDF4":"#FFF1F2"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:12}}>{disc}</span>
                  <span style={{fontSize:10,color:"#6B7280"}}>{CC[disc]||disc}</span>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:ok?"#059669":"#DC2626",marginBottom:6}}>{cop}/{need}h {ok?"✓":"⚠"}</div>
                {dCl.length>0?dCl.map(d=><div key={d.id} style={{fontSize:11,color:"#374151"}}>👤 {d.nome}</div>):(
                  <div style={{fontSize:11,color:"#9CA3AF",fontStyle:"italic"}}>
                    Da assegnare – usare tab Docenti<br/>
                    <span style={{fontSize:10}}>siedeTipo: CARCERARIA, classe: {selAnno}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        <div style={{marginTop:14,padding:"10px 14px",background:"#EFF6FF",borderRadius:7,fontSize:12,color:"#1D4ED8"}}>
          💡 Per assegnare docenti alla sezione carceraria: vai su <b>Per Docente</b> → seleziona il docente → Aggiungi Assegnazione → scegli <b>Sezione Carceraria</b> e la classe (es. <b>{selAnno}</b>).
        </div>
      </div>
      <div style={{marginTop:14,background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#1B3A6B",marginBottom:8}}>Totale ore carcere per anno</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#F9FAFB"}}>
            {["Anno","Ore tot.","Discipline",...anni.map(a=>"")].slice(0,3).map(h=><th key={h} style={{padding:"6px 9px",textAlign:"left",borderBottom:"1px solid #E5E7EB",fontWeight:600,color:"#6B7280"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {anni.map(a=>{
              const o=ORE_CARCERARIA[a]||{};
              const tot=Object.values(o).reduce((s,v)=>s+v,0);
              return(
                <tr key={a} style={{borderBottom:"1px solid #F3F4F6",background:a===selAnno?"#EFF6FF":"transparent",cursor:"pointer"}} onClick={()=>setSelAnno(a)}>
                  <td style={{padding:"6px 9px",fontWeight:600}}>{a}</td>
                  <td style={{padding:"6px 9px",fontWeight:700,color:"#1B3A6B"}}>{tot}h</td>
                  <td style={{padding:"6px 9px",fontSize:11,color:"#6B7280"}}>{Object.keys(o).join(", ")}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── POTENZIAMENTO ─────────────────────────────────────────────────────────────
function PotView({docenti,settings,updDoc}){
  const {orePotIsola,orePotVilla}=settings;
  const docPot=useMemo(()=>docenti.filter(d=>calcPot(d)>0||d.assegn.length===0),[docenti]);
  const usatiIsola=docenti.filter(d=>d.assegn.some(a=>a[0].startsWith("ISOLA"))).reduce((s,d)=>s+calcPot(d),0);
  const usatiVilla=docenti.filter(d=>d.assegn.some(a=>a[0].startsWith("VILLA"))).reduce((s,d)=>s+calcPot(d),0);
  const potDocAll=docenti.filter(d=>calcPot(d)>0);
  return(
    <div>
      <h2 style={{fontSize:16,fontWeight:700,color:"#1B3A6B",marginBottom:12}}>Organico del Potenziamento</h2>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
        {[["Isola – Ore Pot. totali",orePotIsola,usatiIsola,"#1B3A6B"],["Villafranca – Ore Pot. totali",orePotVilla,usatiVilla,"#7C3AED"]].map(([label,tot,usati,col])=>{
          const res=tot-usati;const p=tot>0?Math.min(100,Math.round(usati/tot*100)):0;
          return(
            <div key={label} style={{background:"#fff",borderRadius:8,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,.07)",borderLeft:`4px solid ${col}`}}>
              <div style={{fontWeight:700,fontSize:13,color:col,marginBottom:8}}>{label}: <b>{tot}h</b></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:4}}>
                <span>Assegnate: <b style={{color:usati>tot?"#DC2626":"#059669"}}>{usati}h</b></span>
                <span>Residue: <b style={{color:res<0?"#DC2626":res<10?"#D97706":"#059669"}}>{res}h</b></span>
              </div>
              <div style={{background:"#E5E7EB",borderRadius:5,height:8}}>
                <div style={{background:p>100?"#DC2626":p>80?"#D97706":"#059669",width:`${Math.min(100,p)}%`,height:8,borderRadius:5}}/>
              </div>
            </div>
          );
        })}
      </div>
      <div style={{background:"#fff",borderRadius:8,padding:14,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <div style={{fontWeight:700,fontSize:13,color:"#1B3A6B",marginBottom:10}}>Docenti con ore di potenziamento</div>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
          <thead><tr style={{background:"#F9FAFB"}}>
            {["Docente","Disciplina","Ore Cattedra","Ore Pot.","Totale","Note"].map(h=><th key={h} style={{padding:"7px 9px",textAlign:"left",borderBottom:"1px solid #E5E7EB",fontWeight:600,color:"#6B7280"}}>{h}</th>)}
          </tr></thead>
          <tbody>
            {potDocAll.length===0&&<tr><td colSpan={6} style={{padding:16,color:"#9CA3AF",textAlign:"center"}}>Nessun docente con ore di potenziamento segnalate nelle note (es. "9 pot", "12 h pot").</td></tr>}
            {potDocAll.map(d=>{
              const tot=calcOre(d);const pot=calcPot(d);const catt=tot-pot;
              return(
                <tr key={d.id} style={{borderBottom:"1px solid #F3F4F6"}}>
                  <td style={{padding:"7px 9px",fontWeight:600,color:"#1B3A6B"}}>{d.nome}</td>
                  <td style={{padding:"7px 9px",color:"#6B7280"}}>{d.disc}</td>
                  <td style={{padding:"7px 9px",fontWeight:700}}>{Math.max(0,catt)}h</td>
                  <td style={{padding:"7px 9px"}}><span style={{background:"#EDE9FE",color:"#6366F1",padding:"2px 8px",borderRadius:9,fontSize:11,fontWeight:700}}>{pot}h</span></td>
                  <td style={{padding:"7px 9px",fontWeight:700,color:"#1B3A6B"}}>{tot}h</td>
                  <td style={{padding:"7px 9px",fontSize:11,color:"#6B7280"}}>{d.note||"—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        <div style={{marginTop:12,padding:"10px 14px",background:"#EDE9FE",borderRadius:7,fontSize:12,color:"#6366F1"}}>
          💡 Le ore di potenziamento vengono rilevate automaticamente dalle <b>Note</b> del docente (es. <i>"9 pot"</i>, <i>"12 h pot"</i>). Per modificarle, aggiornare il campo Note nella scheda del docente.
        </div>
      </div>
    </div>
  );
}

// ─── IMPOSTAZIONI ─────────────────────────────────────────────────────────────
function SettingsView({settings,saveSet,resetData,resetGruppi}){
  const [loc,setLoc]=useState(settings);
  function save(){saveSet(loc);alert("✓ Impostazioni salvate");}
  return(
    <div style={{maxWidth:600}}>
      <h2 style={{fontSize:16,fontWeight:700,color:"#1B3A6B",marginBottom:14}}>Impostazioni</h2>
      <div style={{background:"#fff",borderRadius:8,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,.07)",marginBottom:14}}>
        <h3 style={{fontSize:14,fontWeight:700,marginBottom:12}}>Ore Cattedra</h3>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {[["Ore standard","oreStd"],["Ore massime (dirigente)","oreMax"],["Ore pot. Isola","orePotIsola"],["Ore pot. Villa","orePotVilla"]].map(([l,k])=>(
            <div key={k}>
              <label style={{fontSize:12,color:"#6B7280",display:"block",marginBottom:3}}>{l}</label>
              <input type="number" value={loc[k]} onChange={e=>setLoc(v=>({...v,[k]:+e.target.value}))} style={{width:"100%",padding:"7px 10px",borderRadius:6,border:"1px solid #D1D5DB",fontSize:13}}/>
            </div>
          ))}
        </div>
        <button onClick={save} style={{marginTop:14,padding:"7px 18px",background:"#1B3A6B",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Salva</button>
      </div>
      <div style={{background:"#FFF5F5",borderRadius:8,padding:18,boxShadow:"0 1px 4px rgba(0,0,0,.07)"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#DC2626",marginBottom:10}}>Zona Pericolosa</h3>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <button onClick={resetData} style={{padding:"7px 16px",background:"#DC2626",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Ripristina Docenti</button>
          <button onClick={resetGruppi} style={{padding:"7px 16px",background:"#D97706",color:"#fff",border:"none",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:600}}>Ripristina Gruppi Lingua</button>
        </div>
        <p style={{fontSize:11,color:"#9CA3AF",marginTop:8}}>Le modifiche ai docenti e ai gruppi lingua andranno perse.</p>
      </div>
    </div>
  );
}
